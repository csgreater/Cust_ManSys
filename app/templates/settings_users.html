{% extends "base.html" %}
{% block title %}用户配置 - 订单数据管理系统{% endblock %}
{% block content %}
<header class="page-head">
  <div><p class="eyebrow">SETTINGS</p><h1>用户配置</h1></div>
  <a class="button ghost" href="/settings/roles">角色数据范围</a>
</header>
<section class="panel">
  <table>
    <thead><tr><th>ID</th><th>账号</th><th>姓名</th><th>角色</th><th>状态</th></tr></thead>
    <tbody>
      {% for row in users %}
      <tr>
        <td>{{ row.id }}</td>
        <td>{{ row.username }}</td>
        <td>{{ row.display_name }}</td>
        <td>{{ row.roles }}</td>
        <td>{{ '启用' if row.is_active else '停用' }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
